<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - HustleDesk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <!-- Header -->
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <button onclick="window.history.back()" class="p-2 rounded-lg hover:bg-gray-100">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <h1 class="text-xl font-semibold text-gray-800">Verify Phone</h1>
                <div class="w-6"></div> <!-- Spacer for balance -->
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 p-6">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold text-gray-800 mb-2">Enter verification code</h2>
                <p class="text-gray-600" id="phoneNumberDisplay">
                    We've sent a 6-digit code to your phone number
                </p>
            </div>

            <!-- OTP Input -->
            <form id="otpForm" class="space-y-6">
                <div class="flex justify-center space-x-3">
                    <input type="text" maxlength="1" class="w-14 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" pattern="[0-9]" required>
                    <input type="text" maxlength="1" class="w-14 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" pattern="[0-9]" required>
                    <input type="text" maxlength="1" class="w-14 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" pattern="[0-9]" required>
                    <input type="text" maxlength="1" class="w-14 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" pattern="[0-9]" required>
                    <input type="text" maxlength="1" class="w-14 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" pattern="[0-9]" required>
                    <input type="text" maxlength="1" class="w-14 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" pattern="[0-9]" required>
                </div>

                <!-- Resend Code -->
                <div class="text-center">
                    <p class="text-sm text-gray-600 mb-4">
                        Didn't receive the code? 
                        <button type="button" onclick="resendCode()" class="text-blue-600 font-semibold hover:underline" id="resendButton">
                            Resend code
                        </button>
                    </p>
                    <p class="text-xs text-gray-500" id="countdown">
                        You can request a new code in <span id="timer">60</span> seconds
                    </p>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-semibold hover:bg-blue-700 transition-colors btn-hover">
                    Verify & Continue
                </button>
            </form>
        </div>
    </div>

    <script>
        // Display phone number from registration
        document.addEventListener('DOMContentLoaded', function() {
            const tempUserData = JSON.parse(localStorage.getItem('tempUserData') || '{}');
            if (tempUserData.phone) {
                document.getElementById('phoneNumberDisplay').textContent = 
                    `We've sent a 6-digit code to ${tempUserData.phone}`;
            }

            // Auto-focus first input
            const inputs = document.querySelectorAll('input[type="text"]');
            inputs[0].focus();

            // Auto-move to next input
            inputs.forEach((input, index) => {
                input.addEventListener('input', function() {
                    if (this.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value === '' && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });

            // Start countdown timer
            startCountdown();
        });

        function startCountdown() {
            let timeLeft = 60;
            const timerElement = document.getElementById('timer');
            const resendButton = document.getElementById('resendButton');
            const countdownElement = document.getElementById('countdown');

            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    resendButton.disabled = false;
                    countdownElement.style.display = 'none';
                }
            }, 1000);
        }

        function resendCode() {
            showToast('New verification code sent!', 'success');
            startCountdown();
            document.getElementById('countdown').style.display = 'block';
            document.getElementById('resendButton').disabled = true;
        }

        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const inputs = document.querySelectorAll('input[type="text"]');
            let otp = '';
            inputs.forEach(input => {
                otp += input.value;
            });

            if (otp.length === 6) {
                // Simulate OTP verification
                showToast('Phone verified successfully!', 'success');
                
                // Store user as verified
                const tempUserData = JSON.parse(localStorage.getItem('tempUserData') || '{}');
                localStorage.setItem('currentUser', JSON.stringify({
                    ...tempUserData,
                    isVerified: true,
                    joinedDate: new Date().toISOString()
                }));
                
                // Clear temp data
                localStorage.removeItem('tempUserData');
                
                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = '../dashboard.html';
                }, 1000);
            } else {
                showToast('Please enter a valid 6-digit code', 'error');
            }
        });

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
