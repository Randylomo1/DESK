<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HustleDesk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static/css/styles.css">
    <script type="module" src="./js/firebase.js"></script>
    <script type="module" src="./js/auth.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <!-- Header -->
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <button onclick="window.history.back()" class="p-2 rounded-lg hover:bg-gray-100">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <h1 class="text-xl font-semibold text-gray-800">Create Account</h1>
                <div class="w-6"></div> <!-- Spacer for balance -->
            </div>
        </div>

        <!-- Form -->
        <div class="flex-1 p-6">
            <form id="registerForm" class="space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                        <input type="text" name="name" required autocomplete="name" class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter your full name">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <input type="email" name="email" required autocomplete="email" class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter your email address">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Business Name</label>
                        <input type="text" name="businessName" required class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter your business name">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Business Category</label>
                        <select name="businessCategory" required class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            <option value="">Select category</option>
                            <option value="food">Food & Restaurant</option>
                            <option value="retail">Retail Shop</option>
                            <option value="salon">Salon & Beauty</option>
                            <option value="services">Services</option>
                            <option value="fashion">Fashion & Clothing</option>
                            <option value="electronics">Electronics</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" name="password" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter your password (min 6 characters)">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                        <input type="password" name="passwordConfirm" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Confirm your password">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-semibold hover:bg-blue-700 transition-colors btn-hover">
                    Create Account
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const name = formData.get('name');
            const email = formData.get('email');
            const password = formData.get('password');
            const businessName = formData.get('businessName');
            const businessCategory = formData.get('businessCategory');

            try {
                const response = await authService.register(name, email, password, businessName, businessCategory);
                if (response.success) {
                    showToast('Registered successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = '../login.html';
                    }, 1000);
                } else {
                    showToast(response.error, 'error');
                }
            } catch (error) {
                showToast('Registration failed. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
