<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HustleDesk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <!-- Header -->
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <button onclick="window.history.back()" class="p-2 rounded-lg hover:bg-gray-100">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <h1 class="text-xl font-semibold text-gray-800">Create Account</h1>
                <div class="w-6"></div> <!-- Spacer for balance -->
            </div>
        </div>

        <!-- Form -->
        <div class="flex-1 p-6">
            <form id="registerForm" class="space-y-6">
                <!-- Social Login Options -->
                <div class="space-y-3">
                    <button type="button" onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 rounded-xl py-3 px-4 hover:bg-gray-50 transition-colors">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continue with Google
                    </button>
                    
                    <button type="button" onclick="signInWithFacebook()" class="w-full flex items-center justify-center gap-3 bg-blue-600 text-white rounded-xl py-3 px-4 hover:bg-blue-700 transition-colors">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        Continue with Facebook
                    </button>
                </div>

                <!-- Divider -->
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-gray-50 text-gray-500">Or continue with phone</span>
                    </div>
                </div>

                <!-- Phone Registration Form -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                        <input type="text" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter your full name">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Business Name</label>
                        <input type="text" name="businessName" required class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter your business name">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Business Category</label>
                        <select name="category" required class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            <option value="">Select category</option>
                            <option value="food">Food & Restaurant</option>
                            <option value="retail">Retail Shop</option>
                            <option value="salon">Salon & Beauty</option>
                            <option value="services">Services</option>
                            <option value="fashion">Fashion & Clothing</option>
                            <option value="electronics">Electronics</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number (M-Pesa)</label>
                        <div class="flex gap-2">
                            <div class="w-20">
                                <select name="countryCode" class="w-full px-3 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                                    <option value="+254">+254</option>
                                    <option value="+255">+255</option>
                                    <option value="+256">+256</option>
                                    <option value="+257">+257</option>
                                </select>
                            </div>
                            <input type="tel" name="phone" required class="flex-1 px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="712 345 678">
                        </div>
                    </div>
                </div>

                <!-- Terms and Privacy -->
                <div class="text-xs text-gray-600">
                    <p>By creating an account, you agree to our <a href="#" class="text-blue-600 hover:underline">Terms of Service</a> and acknowledge you've read our <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>.</p>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-semibold hover:bg-blue-700 transition-colors btn-hover">
                    Continue with Phone
                </button>
            </form>
        </div>
    </div>

    <script>
        function signInWithGoogle() {
            showToast('Google sign-in would be implemented here', 'info');
        }

        function signInWithFacebook() {
            showToast('Facebook sign-in would be implemented here', 'info');
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const userData = {
                name: formData.get('name'),
                businessName: formData.get('businessName'),
                category: formData.get('category'),
                phone: formData.get('countryCode') + formData.get('phone').replace(/\D/g, '')
            };

            // Store user data temporarily
            localStorage.setItem('tempUserData', JSON.stringify(userData));
            
            // Redirect to OTP verification
            window.location.href = 'verify-otp.html';
        });

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
