<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Sale - HustleDesk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js" defer></script>
    <script src="../js/sales.js" defer></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <button onclick="window.history.back()" class="p-2 rounded-lg hover:bg-gray-100 mr-2">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    <h1 class="text-xl font-semibold text-gray-800">Record Sale</h1>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <form id="recordSaleForm" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Customer Name</label>
                <input type="text" name="customer" required class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter customer name">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Amount</label>
                <input type="number" name="amount" required class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter sale amount">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Payment Method</label>
                <select name="paymentMethod" required class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                    <option value="cash">Cash</option>
                    <option value="mpesa">M-Pesa</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea name="description" class="w-full px-4 py-3 border border-gray-300 rounded-xl form-input focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Enter sale description"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-semibold hover:bg-blue-700 transition-colors">
                Record Sale
            </button>
        </form>
    </main>

    <script>
        document.getElementById('recordSaleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const saleData = {
                customer: formData.get('customer'),
                amount: formData.get('amount'),
                paymentMethod: formData.get('paymentMethod'),
                description: formData.get('description'),
                date: new Date().toISOString()
            };

            // Store sale data in localStorage
            const sales = JSON.parse(localStorage.getItem('sales') || '[]');
            sales.push(saleData);
            localStorage.setItem('sales', JSON.stringify(sales));

            // Show success message and redirect
            showToast('Sale recorded successfully!', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
